name: CI FastAPI

on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: ${{ github.workspace }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
  OPENAI_EXPLANATION_MODEL: ${{ secrets.OPENAI_EXPLANATION_MODEL }}
  EVAL_MIN_ACCURACY: "0.70"

jobs:
  test-and-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar import da aplicacao
        run: python -c "from app.main import app; print(app.title)"

      - name: Rodar testes com cobertura minima de 80%
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Validar endpoint de saude
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          response = client.get("/health")
          assert response.status_code == 200, f"Status inesperado: {response.status_code}"
          assert response.json().get("status") == "ok", f"Payload inesperado: {response.json()}"
          print("Healthcheck OK")
          PY

      - name: Rodar avaliacao offline (run_eval)
        run: python scripts/run_eval.py

      - name: Validar classificacao via endpoint /predict
        run: |
          python scripts/eval_predict_endpoint.py \
            --min-accuracy "${EVAL_MIN_ACCURACY}"

